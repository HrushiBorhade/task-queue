services:
  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    container_name: worker
    # For production: pull pre-built image from ghcr.io
    # image: ghcr.io/hrushiborhade/task-queue-worker:latest
    # For local dev: build from source
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    ports:
      - "9090:9090"  # health check
      - "9091:9091"  # bull board
      - "9092:9092"  # prometheus metrics
    env_file:
      - apps/worker/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data: