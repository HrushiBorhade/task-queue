name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/task-queue-worker

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run --filter=web test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run --filter=web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub
          SUPABASE_SERVICE_ROLE_KEY: stub
          NEXT_PUBLIC_POSTHOG_KEY: stub
          NEXT_PUBLIC_POSTHOG_HOST: http://localhost
          NEXT_PUBLIC_SENTRY_DSN: stub
          SENTRY_AUTH_TOKEN: stub

  supabase:
    name: Supabase Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations
        run: |
          count=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "Found $count migration files"
          if [ "$count" -eq 0 ]; then
            echo "::warning::No migration files found"
          fi
          for f in supabase/migrations/*.sql; do
            echo "Checking $f..."
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Empty migration file"
              exit 1
            fi
          done
          echo "All migration files validated"

      - name: Verify config
        run: |
          if [ ! -f supabase/config.toml ]; then
            echo "::error::supabase/config.toml not found"
            exit 1
          fi
          echo "Supabase config exists"

  # ─── Docker: Build & Push Worker Image ───────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    # Only push on main branch, build (but don't push) on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Buildx gives us layer caching, multi-platform support, and
      # BuildKit features (parallel stage builds, cache mounts)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry using the automatic
      # GITHUB_TOKEN — no secrets to configure, no PATs to rotate
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Auto-generate image tags from git context:
      #   main branch  → :main, :latest
      #   v1.2.3 tag   → :v1.2.3, :1.2
      #   any push     → :sha-a1b2c3d (immutable, for rollbacks)
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build from monorepo root (Dockerfile expects COPY from root)
      # GHA cache stores layers in GitHub's cache backend — free,
      # 10 GB limit, shared across branches. mode=max caches ALL
      # layers (not just final stage), so dependency installs are
      # cached even when source code changes.
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SLSA provenance attestation — proves this image was built
      # by THIS workflow in THIS repo. Supply chain security best
      # practice, verifiable with: gh attestation verify <image>
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
