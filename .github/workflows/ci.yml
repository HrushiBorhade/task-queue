name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run --filter=web test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run --filter=web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub
          SUPABASE_SERVICE_ROLE_KEY: stub
          NEXT_PUBLIC_POSTHOG_KEY: stub
          NEXT_PUBLIC_POSTHOG_HOST: http://localhost
          NEXT_PUBLIC_SENTRY_DSN: stub
          SENTRY_AUTH_TOKEN: stub

  supabase:
    name: Supabase Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations
        run: |
          count=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "Found $count migration files"
          if [ "$count" -eq 0 ]; then
            echo "::warning::No migration files found"
          fi
          for f in supabase/migrations/*.sql; do
            echo "Checking $f..."
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Empty migration file"
              exit 1
            fi
          done
          echo "All migration files validated"

      - name: Verify config
        run: supabase validate
